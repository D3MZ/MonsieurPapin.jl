outputpath = "research.md"

[crawl]
crawlpath = "https://data.commoncrawl.org/crawl-data/CC-MAIN-2026-08/wet.paths.gz"
crawlroot = "https://data.commoncrawl.org/"
# capacity: 0 = auto (Threads.nthreads() * 10)
capacity = 0
languages = ["eng", "deu", "rus", "jpn", "zho", "spa", "fra", "por", "ita", "pol"]
dedupe_capacity = 100_000

[search]
threshold = 0.6
vecpath = "minishlab/potion-multilingual-128M"
query = ""
keywords = []

[llm]
baseurl = "http://localhost:1234"
path = "/api/v1/chat"
model = "qwen/qwen3.6-27b"
password = ""
timeoutseconds = 120

[prompt]
system_file = "prompts/system.txt"
input_file = "prompts/input.txt"
