[crawl]
path = "https://data.commoncrawl.org/crawl-data/CC-MAIN-2026-08/wet.paths.gz"
root = "https://data.commoncrawl.org/"
# ALL languages Common Crawl's own detector (CLD2, via WARC-Identified-Content-Language) can tag as
# ISO 639-3 — the LLM (Qwen3.6, 201 languages) is not the limiting factor, so this is the maximum
# achievable coverage: every CLD2-detectable language, minus the 12 Common Crawl's own erratum flags
# as unreliable (trained without script samples: ewe, gaa, kri, loz, lua, luo, new, oss, pam, raj,
# tum, twi). 159 codes. The keyword bootstrap generates idiomatic trading terms per language in small
# batches, so trading content is findable in every one regardless of crawl size.
languages = [
    "aar", "abk", "afr", "aka", "amh", "ara", "asm", "aym", "aze", "bak",
    "bel", "ben", "bih", "bis", "bod", "bos", "bre", "bul", "cat", "ceb",
    "ces", "chr", "cos", "crs", "cym", "dan", "deu", "div", "dzo", "ell",
    "eng", "epo", "est", "eus", "fao", "fas", "fij", "fin", "fra", "fry",
    "gla", "gle", "glg", "glv", "grn", "guj", "hat", "hau", "haw", "heb",
    "hin", "hmn", "hrv", "hun", "hye", "ibo", "iku", "ile", "ina", "ind",
    "ipk", "isl", "ita", "jav", "jpn", "kal", "kan", "kas", "kat", "kaz",
    "kha", "khm", "kin", "kir", "kor", "kur", "lao", "lat", "lav", "lif",
    "lin", "lit", "ltz", "lug", "mal", "mar", "mfe", "mkd", "mlg", "mlt",
    "mon", "mri", "msa", "mya", "nau", "nep", "nld", "nno", "nor", "nso",
    "nya", "oci", "ori", "orm", "pan", "pol", "por", "pus", "que", "roh",
    "ron", "run", "rus", "sag", "san", "sco", "sin", "slk", "slv", "smo",
    "sna", "snd", "som", "sot", "spa", "sqi", "srp", "ssw", "sun", "swa",
    "swe", "syr", "tam", "tat", "tel", "tgk", "tgl", "tha", "tir", "ton",
    "tsn", "tso", "tuk", "tur", "uig", "ukr", "urd", "uzb", "ven", "vie",
    "vol", "war", "wol", "xho", "yid", "yor", "zha", "zho", "zul",
]

[pipeline]
capacity = 1000
threshold = 0.6
dedupe_capacity = 100000
# Minimum distinct keyword hits for a page to enter the waterfall. Higher = more selective, so the
# slow embedding stage is not flooded and download throughput is not throttled to embedding's rate.
min_keywords = 4
# Leave empty to bootstrap keywords from `seeds` via the LLM; set non-empty to override ALL
# languages with a single flat list (skips per-language generation entirely).
keywords = []
# Per-language keyword cache (JSON: {"iso639-3": ["term", ...]}). The bootstrap generates a language
# only if it is absent here AND absent from [crawl.manual_keywords]; generated languages are written
# back, so reruns skip the build. Delete a language's entry (or the file) to force regeneration.
# Hand-editable. Lives outside settings.toml to avoid cluttering it with thousands of terms.
keyword_cache = "keywords_cache.json"
# Seed pages the run bootstraps from: fetched, then the LLM extracts multilingual trading
# keywords + a semantic query. Keyword-dense, plain-HTML pages first (JS-rendered pages scrape
# to almost nothing through the plain-HTTP fetch).
seeds = [
    "https://en.wikipedia.org/wiki/Technical_analysis",
    "https://en.wikipedia.org/wiki/Trading_strategy",
    "https://www.incrediblecharts.com/indicators/technical-indicators.php",
    "https://www.incrediblecharts.com/indicators/moving_average.php",
]

[embedding]
model = "minishlab/potion-multilingual-128M"

[llm]
baseurl = "http://localhost:1234"
path = "/v1/chat/completions"
model = "google/gemma-4-12b-qat"
password = ""
timeout = 180
# Concurrent LLM extraction calls (read by extract() as its worker count). Tuning is hardware AND
# server-engine bound, and what matters is throughput on the REAL traffic mix, not a synthetic
# always-long-output benchmark. On a single 24 GB GPU: llama.cpp + MTP speculative decoding gives
# ~31 tok/s single-stream and a ~0.6-1.2s "none" rejection (the dominant case: ~96% of pages are
# rejected, a short, prefill-bound reply); MTP cannot batch (concurrency just queues, flat aggregate
# tok/s, linear latency). Switching to LM Studio's non-MTP continuous batching raised AGGREGATE
# decode tok/s on a synthetic always-long-output benchmark (1x≈38, 6x≈71 tok/s), but on the real
# traffic mix this was a regression in actual pages/hour: short prefill-bound "none" replies don't
# batch nearly as well as long decode-bound ones, so real throughput dropped roughly 8x (measured:
# ETA went from ~3.5 days to ~10 days) despite the higher raw tok/s. Reverted to MTP, parallel=1.
# Re-tune only by measuring pages/hour on the real prompt mix, not a single-shape token benchmark.
parallel = 1
# Off by default: reasoning models (e.g. Qwen3) otherwise spend the whole token budget on
# chain-of-thought and return empty content, and extraction wants the answer directly. Sends
# chat_template_kwargs.enable_thinking=false; servers that don't understand it ignore it. Set
# true only if you specifically want chain-of-thought.
thinking = false

[output]
path = "research.md"

[prompts]
# Extraction prompts keep only concrete, programmable, AND novel strategies: rule-based logic with
# entry/exit conditions and parameters stated ON THE PAGE, grounded by required pseudo-code, with a
# distinctive edge. Generic/textbook strategies (golden cross, RSI 30/70, MACD crossover, Bollinger
# bounce, basic breakout), indicator definitions/name lists, one-off stock/ticker calls, and news all
# map to `none`. The page may be in any language; output is always English. The keyword bootstrap
# generates the idiomatic trading vocabulary actually used in each target language, not literal
# translations.
system = "You extract concrete, tradable, and NOVEL trading strategies from web pages. A strategy qualifies ONLY if the page states actionable, rule-based logic you could program — at least one entry condition, at least one exit condition, and at least one concrete parameter (indicator settings, numeric thresholds, timeframe, stop-loss/target, or position sizing) — AND it is novel or non-obvious. If a knowledgeable trader would recognise it as standard textbook technical analysis — a moving-average / golden-cross or death-cross crossover, RSI or stochastic overbought/oversold (e.g. RSI>70 / <30), a basic MACD-line crossover, a plain Bollinger-band bounce, or a simple support/resistance breakout — reply with exactly `none`. Qualify a strategy only when it has a distinctive edge: an unusual signal input, a specific non-obvious multi-condition system, an uncommon indicator combination, or otherwise original rule logic. A one-off stock or ticker recommendation (for example \"buy X, target Y, stop Z\") is NOT a strategy — it must be a reusable system, not a single call. The page may be in ANY language; read it natively and write your ENTIRE answer in English, translating faithfully. Report ONLY what the page states. Do NOT add rules from your own knowledge, do NOT infer or generalize, and do NOT use hedging words such as \"likely\", \"typically\", \"usually\", or \"generally\" — if you would need them, the rule is not on the page. Reply with exactly `none` (lowercase, nothing else) when the strategy is generic or textbook, when the page merely names or defines indicators, lists them (menus, glossaries, tag/category pages), gives one-off buy/sell or ticker calls, only discusses markets or news, or is too vague to program as written."
input = """
Extract every concrete, tradable, NOVEL strategy stated on this page — skip generic, well-known textbook strategies. For each qualifying strategy output, in English:
- Name
- Entry rule(s)
- Exit rule(s)
- Concrete parameters (indicator settings, thresholds, timeframe, stop/target, instrument)
- What makes it novel / non-obvious (its distinctive edge)
- Pseudo-code implementing EXACTLY the rules on the page (no invented values)
- Source URL
The pseudo-code must be grounded strictly in the page; if you cannot write pseudo-code from the stated rules, the strategy does not qualify. If the page provides no concrete, executable, non-obvious strategy, reply with exactly `none`."""
local_system = "You extract concrete, tradable, and NOVEL trading strategies from web pages. A strategy qualifies ONLY if the page states actionable, rule-based logic you could program — at least one entry condition, at least one exit condition, and at least one concrete parameter (indicator settings, numeric thresholds, timeframe, stop-loss/target, or position sizing) — AND it is novel or non-obvious. If a knowledgeable trader would recognise it as standard textbook technical analysis — a moving-average / golden-cross or death-cross crossover, RSI or stochastic overbought/oversold (e.g. RSI>70 / <30), a basic MACD-line crossover, a plain Bollinger-band bounce, or a simple support/resistance breakout — reply with exactly `none`. Qualify a strategy only when it has a distinctive edge: an unusual signal input, a specific non-obvious multi-condition system, an uncommon indicator combination, or otherwise original rule logic. A one-off stock or ticker recommendation (for example \"buy X, target Y, stop Z\") is NOT a strategy — it must be a reusable system, not a single call. The page may be in ANY language; read it natively and write your ENTIRE answer in English, translating faithfully. Report ONLY what the page states. Do NOT add rules from your own knowledge, do NOT infer or generalize, and do NOT use hedging words such as \"likely\", \"typically\", \"usually\", or \"generally\" — if you would need them, the rule is not on the page. Reply with exactly `none` (lowercase, nothing else) when the strategy is generic or textbook, when the page merely names or defines indicators, lists them (menus, glossaries, tag/category pages), gives one-off buy/sell or ticker calls, only discusses markets or news, or is too vague to program as written."
local_input = """
Extract every concrete, tradable, NOVEL strategy stated on this page — skip generic, well-known textbook strategies. For each qualifying strategy output, in English:
- Name
- Entry rule(s)
- Exit rule(s)
- Concrete parameters (indicator settings, thresholds, timeframe, stop/target, instrument)
- What makes it novel / non-obvious (its distinctive edge)
- Pseudo-code implementing EXACTLY the rules on the page (no invented values)
- Source URL
The pseudo-code must be grounded strictly in the page; if you cannot write pseudo-code from the stated rules, the strategy does not qualify. If the page provides no concrete, executable, non-obvious strategy, reply with exactly `none`."""
keywords_system = "You generate broad, high-recall, MULTILINGUAL search keywords for finding pages that describe TRADING STRATEGIES in a web crawl. These keywords gate a cheap first-pass filter, so optimize for RECALL: the common words and short phrases that appear in almost ANY description of a trading strategy, regardless of indicator. Choose about 25 trading-rule/mechanics concepts — for example: trading strategy, trading system, entry, exit, signal, buy signal, sell signal, stop loss, take profit, price target, long position, short position, breakout, pullback, reversal, trend, momentum, support, resistance, backtest, risk management, position size, timeframe, crossover, overbought, oversold; plus only a FEW core indicators (moving average, RSI, MACD). Do NOT list many specific, exotic, or named indicators or chart patterns. CRITICAL — you MUST expand across languages: for EACH concept output a SEPARATE array element in EVERY ONE of the requested target languages; cover ALL listed languages and skip none, so with K target languages and ~25 concepts the array holds about 25*K elements. For each (concept, language) pair, give the term traders in THAT language actually use, written in that language's own script — idiomatic: a native word, a borrowed loanword (often the English term is kept as-is, e.g. \"RSI\", \"MACD\", \"breakout\", \"price action\"), or a localized phrase — NOT a literal word-for-word translation; use the real vocabulary of that language's trading community. If a language has no established native trading vocabulary, do NOT invent words, transliterate, or repeat syllables to fill space — instead output the forms its traders genuinely use, which for such languages are typically the widely-recognized English/loanword terms (e.g. RSI, MACD, breakout, trading strategy); quality and authenticity matter more than hitting a count. Output each term as a SEPARATE array element; never combine multiple terms or languages into one element, and never use commas or slashes inside an element. No duplicates, no descriptions, no numbering."
summary_system = "Summarize this text."
# Optional hand-curated keyword filters per language (ISO 639-3 -> list of terms). Languages listed
# here are used VERBATIM and never sent to the LLM — add your native language(s) to control their
# filter directly. Languages NOT listed here (and not already in the keyword_cache) are generated by
# the LLM. Empty by default. Example:
#   [crawl.manual_keywords]
#   eng = ["trading strategy", "stop loss", "breakout", "moving average crossover"]
[crawl.manual_keywords]
