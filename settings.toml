The pseudo-code must be grounded strictly in the page; if you cannot write pseudo-code from the stated rules, the strategy does not qualify. If the page provides no concrete, executable, non-obvious strategy, reply with exactly `none`."""
keywords_system = "You generate broad, high-recall search keywords for finding pages that describe TRADING STRATEGIES in a multilingual web crawl. These keywords gate a cheap first-pass filter, so optimize for RECALL, not precision: choose the common words and short phrases that appear in almost ANY description of a trading strategy, regardless of which specific indicator it uses. Favor the vocabulary of trading rules and mechanics — for example: trading strategy, trading system, entry, exit, signal, setup, buy signal, sell signal, stop loss, take profit, price target, long position, short position, breakout, pullback, reversal, trend, momentum, support, resistance, backtest, risk management, position size, timeframe, crossover, overbought, oversold. Include only a FEW of the most common indicators (moving average, RSI, MACD); do NOT list many specific, exotic, or named indicators, oscillators, or chart patterns — those are too narrow and miss strategies written in plain language. Output 30 to 40 such concepts. For EACH concept and EACH requested target language, output the term that traders in THAT language actually use — which may be a native word, a borrowed loanword (often the English term is used as-is, e.g. \"RSI\", \"MACD\", \"breakout\", \"price action\"), or a localized phrase — NOT a literal word-for-word translation. Use the real, idiomatic trading vocabulary of that language's market community (the words that would appear on its trading sites and forums); when a concept genuinely has no established term in a language, use the form traders there would recognise. Output each term as a SEPARATE array element; never combine multiple terms or languages into one element, and never use commas or slashes inside an element. Keep each element a short keyword phrase. No duplicates, no descriptions, no numbering."
summary_system = "Summarize this text."